<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Speed Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0ede8;
      --card:     #ffffff;
      --ink:      #1a1612;
      --muted:    #8a8078;
      --accent:   #e85d26;
      --accent2:  #2563eb;
      --green:    #16a34a;
      --red:      #dc2626;
      --border:   #ddd8d0;
      --shadow:   0 8px 40px rgba(0,0,0,0.10);
      --radius:   18px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Decorative background dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #c9c2b8 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header */
    .header {
      text-align: center;
    }
    .header .tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      color: var(--ink);
      line-height: 1.1;
      letter-spacing: -1px;
    }
    .header h1 span { color: var(--accent); }
    .header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 400;
    }

    /* Card */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      padding: 32px 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* Sentence display */
    .sentence-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .sentence-box {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--ink);
      line-height: 1.7;
      letter-spacing: 0.3px;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .sentence-box::before {
      content: '"';
      position: absolute;
      top: -8px;
      left: 12px;
      font-size: 60px;
      color: var(--border);
      font-family: Georgia, serif;
      line-height: 1;
      pointer-events: none;
    }

    /* Selector */
    .selector-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .selector-row label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .selector-row select {
      flex: 1;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .selector-row select:focus { border-color: var(--accent); }

    /* Input */
    .input-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--ink);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      resize: none;
      height: 100px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      line-height: 1.7;
    }
    textarea:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }
    textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Timer display */
    .timer-display {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }
    .timer-display .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .timer-display .dot.active { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .timer-display .time-val {
      font-weight: 500;
      color: var(--ink);
      font-size: 15px;
      min-width: 40px;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
    }
    button {
      flex: 1;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-start {
      background: var(--ink);
      color: #fff;
      box-shadow: 0 4px 14px rgba(26,22,18,0.18);
    }
    .btn-start:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(26,22,18,0.28); }

    .btn-finish {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(232,93,38,0.22);
    }
    .btn-finish:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(232,93,38,0.36); }

    .btn-reset {
      background: var(--bg);
      color: var(--ink);
      border: 1.5px solid var(--border);
      flex: 0 0 auto;
      padding: 14px 18px;
    }
    .btn-reset:hover:not(:disabled) { background: var(--border); }

    /* Result */
    .result {
      border-radius: 14px;
      padding: 20px 22px;
      display: none;
      align-items: center;
      gap: 16px;
      animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .result.correct {
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      display: flex;
    }
    .result.wrong {
      background: #fef2f2;
      border: 1.5px solid #fecaca;
      display: flex;
    }
    .result-icon {
      font-size: 32px;
      line-height: 1;
      flex-shrink: 0;
    }
    .result-text strong {
      display: block;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 2px;
    }
    .result.correct .result-text strong { color: var(--green); }
    .result.wrong  .result-text strong { color: var(--red); }
    .result-text span {
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* Stats row */
    .stats {
      display: none;
      gap: 12px;
    }
    .stats.show { display: flex; }
    .stat-card {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }
    .stat-card .s-val {
      font-size: 22px;
      font-weight: 800;
      color: var(--ink);
    }
    .stat-card .s-lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="tag">⌨ Student Tool</div>
    <h1>Typing <span>Speed</span> Tester</h1>
    <p>Test your accuracy and how fast you can type.</p>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Sentence Selector -->
    <div>
      <div class="sentence-label">Choose a Sentence</div>
      <div class="selector-row">
        <label>Set →</label>
        <select id="sentenceSelect" onchange="changeSentence()">
          <option value="0">Easy — Quick brown fox</option>
          <option value="1">Medium — Practice makes perfect</option>
          <option value="2">Medium — Keyboard typing</option>
          <option value="3">Hard — Education & success</option>
          <option value="4">Hard — Technology & learning</option>
        </select>
      </div>
    </div>

    <!-- Sentence Display -->
    <div>
      <div class="sentence-label">Type This Sentence</div>
      <div class="sentence-box" id="sentenceBox">
        The quick brown fox jumps over the lazy dog.
      </div>
    </div>

    <!-- Input -->
    <div>
      <div class="input-label">Your Input</div>
      <textarea id="userInput" placeholder="Click START, then begin typing here…" disabled></textarea>
    </div>

    <!-- Timer -->
    <div class="timer-display">
      <div class="dot" id="timerDot"></div>
      <span>Time elapsed:</span>
      <span class="time-val" id="timerVal">0.0s</span>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-start" id="btnStart" onclick="startTest()">▶ Start</button>
      <button class="btn-finish" id="btnFinish" onclick="finishTest()" disabled>■ Finish</button>
      <button class="btn-reset" id="btnReset" onclick="resetTest()" title="Reset">↺</button>
    </div>

    <!-- Result -->
    <div class="result" id="result">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-text">
        <strong id="resultTitle"></strong>
        <span id="resultSub"></span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="statsRow">
      <div class="stat-card">
        <div class="s-val" id="statTime">—</div>
        <div class="s-lbl">Seconds</div>
      </div>
      <div class="stat-card">
        <div class="s-val" id="statChars">—</div>
        <div class="s-lbl">Characters</div>
      </div>
      <div class="stat-card">
        <div class="s-val" id="statWPM">—</div>
        <div class="s-lbl">Est. WPM</div>
      </div>
    </div>

  </div>

  <div class="footer">Press <strong>Start</strong> to begin · <strong>Finish</strong> when done · <strong>↺</strong> to reset</div>
</div>

<script>
  const sentences = [
    "The quick brown fox jumps over the lazy dog.",
    "Practice makes perfect, so keep on typing every day.",
    "A good keyboard and steady hands improve your typing speed.",
    "Education is the key to success and opens many doors in life.",
    "Technology is changing the way students learn and grow each day."
  ];

  let startTime = null;
  let timerInterval = null;
  let running = false;

  function changeSentence() {
    if (running) return;
    const idx = document.getElementById('sentenceSelect').value;
    document.getElementById('sentenceBox').textContent = sentences[idx];
    resetTest(true);
  }

  function startTest() {
    resetDisplay();
    running = true;
    startTime = Date.now();

    const input = document.getElementById('userInput');
    input.disabled = false;
    input.value = '';
    input.focus();

    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnFinish').disabled = false;
    document.getElementById('sentenceSelect').disabled = true;

    const dot = document.getElementById('timerDot');
    dot.classList.add('active');

    timerInterval = setInterval(() => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      document.getElementById('timerVal').textContent = elapsed + 's';
    }, 100);
  }

  function finishTest() {
    if (!running) return;
    running = false;

    clearInterval(timerInterval);
    const elapsed = ((Date.now() - startTime) / 1000);
    const elapsedDisplay = elapsed.toFixed(1);

    document.getElementById('timerDot').classList.remove('active');
    document.getElementById('timerVal').textContent = elapsedDisplay + 's';

    const idx = document.getElementById('sentenceSelect').value;
    const target = sentences[idx];
    const typed  = document.getElementById('userInput').value.trim();

    document.getElementById('userInput').disabled = true;
    document.getElementById('btnFinish').disabled = true;

    const resultEl   = document.getElementById('result');
    const isCorrect  = typed === target;

    resultEl.className = 'result ' + (isCorrect ? 'correct' : 'wrong');
    document.getElementById('resultIcon').textContent  = isCorrect ? '✅' : '❌';
    document.getElementById('resultTitle').textContent = isCorrect ? 'Correct!' : 'Wrong Typing!';
    document.getElementById('resultSub').textContent   = `Time taken: ${elapsedDisplay} seconds`;

    // Stats
    const words = target.trim().split(/\s+/).length;
    const wpm   = Math.round((words / elapsed) * 60);
    document.getElementById('statTime').textContent  = elapsedDisplay + 's';
    document.getElementById('statChars').textContent = typed.length;
    document.getElementById('statWPM').textContent   = isFinite(wpm) ? wpm : '—';
    document.getElementById('statsRow').classList.add('show');
  }

  function resetTest(silent = false) {
    if (!silent && running) {
      clearInterval(timerInterval);
      running = false;
    }
    resetDisplay();

    const input = document.getElementById('userInput');
    input.value = '';
    input.disabled = true;

    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnFinish').disabled = true;
    document.getElementById('sentenceSelect').disabled = false;
    document.getElementById('timerDot').classList.remove('active');
    document.getElementById('timerVal').textContent = '0.0s';
    document.getElementById('statsRow').classList.remove('show');
  }

  function resetDisplay() {
    const r = document.getElementById('result');
    r.className = 'result';
    document.getElementById('resultIcon').textContent  = '';
    document.getElementById('resultTitle').textContent = '';
    document.getElementById('resultSub').textContent   = '';
  }
</script>
</body>
</html>
